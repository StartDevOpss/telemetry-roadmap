global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: ingestion-service
    static_configs:
      - targets: ["ingestion-service:9090"]

  - job_name: device-service
    static_configs:
      - targets: ["device-service:9090"]

  - job_name: alert-service
    static_configs:
      - targets: ["alert-service:9090"]

  - job_name: dashboard-service
    static_configs:
      - targets: ["dashboard-service:9090"]
