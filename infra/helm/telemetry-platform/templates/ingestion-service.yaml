apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestion-service
  namespace: {{ .Release.Namespace }}
  labels:
    app: ingestion-service
    {{- include "telemetry-platform.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.ingestion.replicas }}
  selector:
    matchLabels:
      app: ingestion-service
  template:
    metadata:
      labels:
        app: ingestion-service
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
      containers:
        - name: ingestion-service
          image: {{ include "telemetry-platform.image" (dict "registry" .Values.global.imageRegistry "name" "telemetry/ingestion-service" "tag" .Values.global.imageTag) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          env:
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: telemetry-config
                  key: KAFKA_BROKERS
            - name: HTTP_ADDR
              valueFrom:
                configMapKeyRef:
                  name: telemetry-config
                  key: HTTP_ADDR
          ports:
            - containerPort: 8081
          resources:
            {{- toYaml .Values.ingestion.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: ingestion-service
  namespace: {{ .Release.Namespace }}
  labels:
    app: ingestion-service
    {{- include "telemetry-platform.labels" . | nindent 4 }}
spec:
  type: NodePort
  selector:
    app: ingestion-service
  ports:
    - port: 80
      targetPort: 8081
      nodePort: {{ .Values.ingestion.nodePort }}
