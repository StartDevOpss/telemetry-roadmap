# Em produção substitua por External Secrets Operator ou Vault.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "telemetry-platform.labels" . | nindent 4 }}
type: Opaque
data:
  password: {{ .Values.secrets.postgresPassword | quote }}
