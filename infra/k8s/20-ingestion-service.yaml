apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestion-service
  namespace: telemetry
  labels:
    app: ingestion-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ingestion-service
  template:
    metadata:
      labels:
        app: ingestion-service
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
      containers:
        - name: ingestion-service
          image: telemetry/ingestion-service:latest
          imagePullPolicy: Never
          env:
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: telemetry-config
                  key: KAFKA_BROKERS
            - name: HTTP_ADDR
              valueFrom:
                configMapKeyRef:
                  name: telemetry-config
                  key: HTTP_ADDR
          ports:
            - containerPort: 8081
          resources:
            requests:
              cpu: "100m"
              memory: "32Mi"
            limits:
              cpu: "250m"
              memory: "64Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: ingestion-service
  namespace: telemetry
  labels:
    app: ingestion-service
spec:
  type: NodePort
  selector:
    app: ingestion-service
  ports:
    - port: 80
      targetPort: 8081
      nodePort: 30081
