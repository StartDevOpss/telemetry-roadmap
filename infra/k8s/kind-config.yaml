apiVersion: kind.x-k8s.io/v1alpha4
kind: Cluster
name: telemetry-platform
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 30081   # ingestion-service NodePort
        hostPort: 30081
        protocol: TCP
      - containerPort: 30090   # Redpanda Console NodePort
        hostPort: 30090
        protocol: TCP
